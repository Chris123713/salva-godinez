<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            color: #fff;
        }

        #builder-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            max-width: 95vw;
            max-height: 90vh;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .builder-header {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .builder-title {
            font-size: 24px;
            font-weight: 600;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .builder-content {
            padding: 20px;
            max-height: calc(90vh - 140px);
            overflow-y: auto;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #60a5fa;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-right: 10px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .floor-list {
            margin-top: 15px;
        }

        .floor-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floor-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .floor-name {
            font-weight: 600;
            font-size: 16px;
        }

        .floor-coords {
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
        }

        .floor-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .elevator-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .elevator-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .elevator-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .elevator-card-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .elevator-card-info {
            font-size: 12px;
            color: #94a3b8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab:hover {
            color: #60a5fa;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .job-lock-settings {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            font-style: italic;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="builder-container">
        <div class="builder-header">
            <div class="builder-title">🏢 Elevator Builder</div>
            <button class="close-btn" onclick="closeBuilder()">×</button>
        </div>

        <div class="builder-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('create')">Create New</button>
                <button class="tab" onclick="switchTab('manage')">Manage Existing</button>
            </div>

            <!-- Create Tab -->
            <div id="create-tab" class="tab-content active">
                <div class="section">
                    <div class="section-title">Elevator Shaft Settings</div>
                    <div class="input-group">
                        <label class="input-label">Elevator Name</label>
                        <input type="text" id="shaft-name" placeholder="e.g., LSPD Main Elevator">
                        <div class="hint">Give this elevator system a descriptive name</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Floors</div>
                    <div class="button-group">
                        <button class="btn btn-success" onclick="addFloor()">+ Add Floor</button>
                        <button class="btn btn-primary" onclick="getCurrentPosForNewFloor()">Add Floor at Current Position</button>
                    </div>

                    <div id="floor-list" class="floor-list">
                        <!-- Floors will be added here dynamically -->
                    </div>
                </div>

                <div class="section">
                    <div class="button-group">
                        <button class="btn btn-success" onclick="saveElevator()">💾 Save Elevator</button>
                        <button class="btn btn-secondary" onclick="clearForm()">Clear Form</button>
                    </div>
                </div>
            </div>

            <!-- Manage Tab -->
            <div id="manage-tab" class="tab-content">
                <div class="section">
                    <div class="section-title">Existing Elevators</div>
                    <button class="btn btn-primary" onclick="loadElevators()">🔄 Refresh List</button>

                    <div id="elevator-list" class="elevator-list">
                        <!-- Elevator cards will be added here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="builder.js"></script>
</body>
</html>
