<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="elevator-container" class="hidden">
        <div class="elevator-panel">
            <div class="elevator-header">
                <h2 id="elevator-title">Elevator</h2>
                <div class="close-btn" onclick="closeMenu()">✕</div>
            </div>

            <div class="elevator-subtitle">
                Select Your Destination
            </div>

            <!-- Elevator Status Display -->
            <div id="elevator-status" class="elevator-status status-idle">
                Ready
            </div>

            <div id="floors-container" class="floors-container">
                <!-- Floors will be dynamically added here -->
            </div>

            <div class="elevator-footer">
                Press <span class="key">ESC</span> to close
            </div>
        </div>
    </div>

    <!-- Elevator Builder Interface -->
    <div id="builder-container" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 900px; max-width: 95vw; max-height: 90vh; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 10000;">
        <div style="background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%); padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 24px; font-weight: 600; color: white;">🏢 Elevator Builder</div>
            <button style="background: rgba(255, 255, 255, 0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 20px;" onclick="closeBuilder()">×</button>
        </div>

        <div style="padding: 20px; max-height: calc(90vh - 140px); overflow-y: auto; color: white;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                <button class="tab active" onclick="switchTab('create')" style="padding: 12px 24px; background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent;">Create New</button>
                <button class="tab" onclick="switchTab('manage')" style="padding: 12px 24px; background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent;">Manage Existing</button>
            </div>

            <!-- Create Tab -->
            <div id="create-tab" class="tab-content" style="display: block;">
                <div style="margin-bottom: 25px;">
                    <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #60a5fa;">Elevator Shaft Settings</div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #cbd5e1;">Elevator Name</label>
                        <input type="text" id="shaft-name" placeholder="e.g., LSPD Main Elevator" style="width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; color: white; font-size: 14px;">
                        <div style="font-size: 12px; color: #94a3b8; font-style: italic; margin-top: 4px;">Give this elevator system a descriptive name</div>
                    </div>
                </div>

                <div style="margin-bottom: 25px;">
                    <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #60a5fa;">Floors</div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                        <button onclick="addFloor()" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: #10b981; color: white;">+ Add Floor</button>
                        <button onclick="getCurrentPosForNewFloor()" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: #3b82f6; color: white;">Add Floor at Current Position</button>
                    </div>

                    <div id="floor-list" style="margin-top: 15px;">
                        <!-- Floors will be added here dynamically -->
                    </div>
                </div>

                <div style="margin-bottom: 25px;">
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button onclick="saveElevator()" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: #10b981; color: white;">💾 Save Elevator</button>
                        <button onclick="clearForm()" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: #64748b; color: white;">Clear Form</button>
                    </div>
                </div>
            </div>

            <!-- Manage Tab -->
            <div id="manage-tab" class="tab-content" style="display: none;">
                <div style="margin-bottom: 25px;">
                    <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #60a5fa;">Existing Elevators</div>
                    <button onclick="loadElevators()" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: #3b82f6; color: white; margin-bottom: 15px;">🔄 Refresh List</button>

                    <div id="elevator-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
                        <!-- Elevator cards will be added here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="builder.js"></script>
</body>
</html>
