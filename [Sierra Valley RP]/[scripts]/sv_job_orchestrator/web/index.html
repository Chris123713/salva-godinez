<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-briefcase"></i> Job Market</h1>
            <p class="subtitle">Real-time supply & demand pricing</p>
        </header>

        <div class="job-grid" id="jobGrid">
            <!-- Job cards will be populated here by JavaScript -->
            <div class="loading">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <span>Loading job data...</span>
            </div>
        </div>

        <footer>
            <div class="legend">
                <span class="legend-item surge"><i class="fa-solid fa-arrow-trend-up"></i> High Demand (+35%)</span>
                <span class="legend-item normal"><i class="fa-solid fa-minus"></i> Normal Rate</span>
                <span class="legend-item declining"><i class="fa-solid fa-arrow-trend-down"></i> Cooling (-10%)</span>
                <span class="legend-item saturated"><i class="fa-solid fa-exclamation-triangle"></i> Saturated (-30%)</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
